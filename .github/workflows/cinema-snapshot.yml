name: Cinema Sessions Snapshot

on:
  schedule:
    # Every day at 09:00 UTC (06:00 BRT)
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch cinema sessions
        run: node scripts/snapshot-cinema.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sessoes-cinema.json
          git diff --cached --quiet || git commit -m "chore: cinema sessions snapshot $(date -u +%Y-%m-%d)"
          git push
